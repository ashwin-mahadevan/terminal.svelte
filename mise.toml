[tools]
node = "26"
pnpm = "11"

[settings]
lockfile = true

[tasks]
dev = "pnpm exec vite dev"
build = "pnpm exec vite build"
preview = "pnpm exec vite preview"
prepare = "pnpm exec svelte-kit sync"
prepack = "pnpm exec svelte-kit sync && pnpm exec svelte-package && pnpm exec publint"
check = "pnpm exec svelte-kit sync && pnpm exec svelte-check --tsconfig ./tsconfig.json"
lint = "pnpm exec eslint ."
format = "pnpm exec prettier --check ."
