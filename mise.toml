[tools]
node = "26"
pnpm = "11"

[settings]
lockfile = true

[tasks.install]
run = """
set -e
pnpm install
mkdir -p node_modules/.mise
touch node_modules/.mise/install.stamp
"""
sources = ["package.json", "pnpm-lock.yaml", "mise.toml"]
outputs = ["node_modules/.mise/install.stamp"]

[tasks."install:playwright"]
depends = ["install"]
run = """
set -e
if [ -n "$CI" ]; then
	pnpm exec playwright install --with-deps chromium firefox webkit
else
	pnpm exec playwright install chromium firefox webkit
fi
mkdir -p node_modules/.mise
touch node_modules/.mise/playwright.stamp
"""
sources = ["package.json", "pnpm-lock.yaml", "playwright.config.ts", "mise.toml"]
outputs = ["node_modules/.mise/playwright.stamp"]

[tasks.clean]
run = "rm -rf .svelte-kit build dist playwright-report test-results coverage"

[tasks.dev]
depends = ["install"]
run = "pnpm exec vite dev"

[tasks.build]
depends = ["clean", "install"]
run = "pnpm exec vite build"

[tasks.preview]
depends = ["install"]
run = "pnpm exec vite preview"

[tasks.checks]
depends = ["check:*"]

[tasks."check:format"]
depends = ["install"]
run = "pnpm exec prettier --check ."

[tasks."check:lint"]
depends = ["install"]
run = "pnpm exec eslint ."

[tasks."check:types"]
depends = ["install"]
run = "pnpm exec svelte-kit sync && pnpm exec svelte-check --tsconfig ./tsconfig.json"

[tasks.tests]
depends = ["test:*"]

[tasks."test:browser"]
depends = ["install:playwright", "build"]
run = "pnpm exec playwright test"

[tasks."test:dom"]
depends = ["clean", "install:playwright"]
run = "pnpm exec vitest run --project dom"

[tasks."test:unit"]
depends = ["clean", "install"]
run = "pnpm exec vitest run --project unit"

[tasks.bench]
depends = ["clean", "install"]
run = "pnpm exec vitest bench --run --project unit"
