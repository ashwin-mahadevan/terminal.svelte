name: Pull request checks
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, edited]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - run: pnpm install
      - run: mise run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - run: pnpm install
      - run: mise run format

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - run: pnpm install
      - run: mise run check
